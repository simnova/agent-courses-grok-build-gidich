packages:
  - "apps/*"
  - "packages/*"
  - "packages/axc-verification/*"
  - "packages/cellix/*"

engineStrict: true

catalog:
  # Core runtime / infra (Node 24 baseline)
  '@types/node': ^24.13.2
  hono: ^4.7.10
  '@marplex/hono-azurefunc-adapter': ^1.0.2
  mongoose: ^8.16.0
  mongodb-memory-server-core: ^10.1.4
  mongodb: ^6.18.0
  typescript: 6.0.3
  tsx: ^4.21.0

  # Guardrails & tooling
  '@biomejs/biome': 2.4.10
  archunit: ^2.1.63
  knip: ^5.88.1
  husky: ^9.1.7
  'lint-staged': ^15.5.2
  turbo: 2.9.18
  rolldown: ^1.1.3
  vitest: ^3.1.1
  '@vitest/coverage-istanbul': ^3.1.1

  # BDD / Serenity (reused from cellix inspiration, modernized)
  '@cucumber/cucumber': ^12.8.1
  '@serenity-js/assertions': 3.43.0
  '@serenity-js/console-reporter': 3.43.0
  '@serenity-js/core': 3.43.0
  '@serenity-js/cucumber': 3.43.0
  '@serenity-js/serenity-bdd': 3.43.0

  # Azure compat note: host.json etc for azure functions v4
  '@azure/functions': ^4.11.0
# Example if ever needed (DO NOT uncomment unless justified):
# allowBuilds:
#   'some-native-dep': true   # reason: ...

# Audit ignores if any unavoidable (documented); start empty
auditConfig:
  ignoreGhsas: []

# Use workspace:* and catalog: for all inter-package / versioned deps.
# pnpm version locked in root package.json packageManager field.
